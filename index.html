                <div className="flex-1 overflow-y-auto">
                  <div className="max-w-6xl mx-auto p-4">
                    {compareBreeds.length < 2 && <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-4"><p className="text-sm text-amber-900">Select at least 2 breeds to compare. You can choose up to 3.</p></div>}
                    <div className="sticky top-0 z-10 -mx-4 px-4 py-3 bg-white/95 backdrop-blur border-b border-stone-200 mb-4">
                      <div className="px-4">
                        <div className="grid grid-cols-[140px_1fr] sm:grid-cols-[180px_1fr] gap-2 items-center">
                          <div className="flex items-center gap-1.5 px-2 py-1.5 rounded-lg bg-emerald-50 border border-emerald-100 min-w-0">
                            <span className="text-base leading-none flex-shrink-0">{countries[country].flag}</span>
                            <div className="min-w-0">
                              <div className="text-[10px] uppercase tracking-wider text-emerald-700 font-semibold leading-tight">Costs in</div>
                              <div className="text-xs font-semibold text-stone-800 leading-tight truncate">{countries[country].currencyCode}</div>
                            </div>
                          </div>
                          <div className="grid gap-3" style={{gridTemplateColumns: `repeat(${Math.max(compareBreeds.length, 1)}, 1fr)`}}>
                            {compareBreeds.map(b => (
                              <div key={b.id} className="flex items-center gap-2 bg-stone-50 rounded-lg p-1.5 pr-6 relative min-w-0">
                                <div className="w-12 h-12 rounded-md overflow-hidden bg-stone-100 flex-shrink-0"><BreedImage breedId={b.id} className="w-full h-full" /></div>
                                <div className="min-w-0 flex-1">
                                  <div className="font-semibold text-xs text-stone-900 leading-tight line-clamp-2">{b.name}</div>
                                  <div className="text-[10px] text-stone-500 truncate mt-0.5">{b.origin}</div>
                                </div>
                                <button onClick={() => toggleBreed(b.id)} className="absolute top-1 right-1 w-5 h-5 rounded-full bg-white/90 hover:bg-rose-50 hover:text-rose-600 flex items-center justify-center text-stone-400"><X size={12} /></button>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                    {compareBreeds.length >= 1 && (
                      <div className="bg-white rounded-xl border border-stone-200 p-4">
                        <div className="text-xs font-bold text-emerald-700 uppercase tracking-wider mb-1">Physical</div>
                        <Row label="Size" getValue={b => b.size} /><Row label="Weight" getValue={b => b.weight} /><Row label="Height" getValue={b => b.height} /><Row label="Lifespan" getValue={b => b.lifespan} /><Row label="Coat type" getValue={b => b.coat} /><Row label="Shedding" getValue={b => b.shedding} type="rating" /><Row label="Drooling" getValue={b => b.drooling} type="rating" /><Row label="Colours" getValue={b => b.colors} />
                        <div className="text-xs font-bold text-emerald-700 uppercase tracking-wider mt-6 mb-1">Temperament</div>
                        <Row label="Trainability" getValue={b => b.trainability} type="rating" /><Row label="Intelligence" getValue={b => b.intelligence} type="rating" /><Row label="Energy" getValue={b => b.energy} type="rating" /><Row label="Playfulness" getValue={b => b.playfulness} type="rating" /><Row label="Affection" getValue={b => b.affection} type="rating" /><Row label="Independence" getValue={b => b.independence} type="rating" /><Row label="Stubbornness" getValue={b => b.stubbornness} type="rating" color="amber" /><Row label="Prey drive" getValue={b => b.preyDrive} type="rating" color="amber" /><Row label="Barking" getValue={b => b.barking} type="rating" color="amber" /><Row label="Watchdog" getValue={b => b.watchdog} type="rating" />
                        <div className="text-xs font-bold text-emerald-700 uppercase tracking-wider mt-6 mb-1">Compatibility</div>
                        <Row label="Strangers" getValue={b => b.strangerFriendly} type="rating" /><Row label="With kids" getValue={b => b.kidFriendly} type="rating" /><Row label="With dogs" getValue={b => b.dogFriendly} type="rating" /><Row label="With cats" getValue={b => b.catFriendly} type="rating" /><Row label="First-timer" getValue={b => b.firstTimer} type="rating" /><Row label="Flat-friendly" getValue={b => b.apartment} type="rating" /><Row label="Alone time" getValue={b => b.aloneTolerance} type="rating" />
                        <div className="text-xs font-bold text-emerald-700 uppercase tracking-wider mt-6 mb-1">Care</div>
                        <Row label="Exercise" getValue={b => b.exercise} /><Row label="Mental needs" getValue={b => b.mentalNeeds} type="rating" /><Row label="Grooming" getValue={b => b.groomingFreq} /><Row label="Grooming/mo" getValue={b => b.groomingCost} type="currency" /><Row label="Training difficulty" getValue={b => b.trainingDifficulty} type="rating" color="amber" /><Row label="Housetraining" getValue={b => b.housetraining} type="rating" color="amber" />
                        <div className="text-xs font-bold text-emerald-700 uppercase tracking-wider mt-6 mb-1">Health & cost</div>
                        <Row label="Health issues" getValue={b => b.healthIssues} /><Row label="Vet costs" getValue={b => '£'.repeat(b.vetCosts)} /><Row label="Insurance/mo" getValue={b => b.insuranceBand} type="currency" /><Row label="Food intake" getValue={b => b.foodConsumption} /><Row label="Purchase price" getValue={b => b.purchasePrice} type="currency" /><Row label="Rescue availability" getValue={b => b.rescueAvailability} type="rating" />
                        <div className="text-xs font-bold text-emerald-700 uppercase tracking-wider mt-6 mb-1">Climate</div>
                        <Row label="Heat tolerance" getValue={b => b.heatTolerance} type="rating" /><Row label="Cold tolerance" getValue={b => b.coldTolerance} type="rating" />
                        <div className="text-xs font-bold text-emerald-700 uppercase tracking-wider mt-6 mb-1">Summary</div>
                        <Row label="Description" getValue={b => b.description} />
                        <div className="h-4"></div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
